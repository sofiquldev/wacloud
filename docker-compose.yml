services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      # Avoid session/cache/queue writes on SQLite when the bind-mounted DB file is not writable by www-data.
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
    depends_on:
      mysql:
        condition: service_healthy
        required: false
    networks:
      - pabna

  nginx:
    image: nginx:1.25-alpine
    environment:
      # Quieter entrypoint script output from the official image.
      NGINX_ENTRYPOINT_QUIET_LOGS: "1"
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - pabna

  # Optional MySQL 8 (match shared hosting). Default dev uses SQLite — no profile needed for app+nginx.
  mysql:
    image: mysql:8.0
    profiles: ["mysql"]
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-pabna}
      MYSQL_USER: ${DB_USERNAME:-pabna}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    ports:
      - "${DB_PORT_FORWARD:-33060}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - pabna
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Run asset builds or `npm run dev` here — not required on shared hosting.
  node:
    image: node:22-bookworm-slim
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    profiles: ["assets"]
    tty: true
    stdin_open: true
    networks:
      - pabna

networks:
  pabna:

volumes:
  mysql_data:
